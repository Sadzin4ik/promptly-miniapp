<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Promptly — Разбор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card-2: #21252e;
    --text: #e8eaed;
    --text-dim: #9aa0aa;
    --accent: #5eb5f7;
    --error: #ff6b6b;
    --error-bg: rgba(255, 107, 107, 0.12);
    --success: #4ec9a3;
    --success-bg: rgba(78, 201, 163, 0.12);
    --border: rgba(255, 255, 255, 0.07);
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    padding: 20px 16px 40px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 560px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .header .dot {
    width: 36px; height: 36px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), #7b6ef6);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 14px rgba(94, 181, 247, 0.3);
  }
  .header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--text-dim); margin-top: 1px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .card:nth-of-type(1) { animation-delay: 0.08s; }
  .card:nth-of-type(2) { animation-delay: 0.16s; }
  .card:nth-of-type(3) { animation-delay: 0.24s; }

  .label {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-bottom: 11px;
  }
  .label .ic { font-size: 14px; }

  .text-block { font-size: 16px; line-height: 1.6; word-wrap: break-word; }

  .original .text-block { color: var(--text-dim); }
  .original s, .original .del {
    color: var(--error);
    text-decoration: line-through;
    text-decoration-thickness: 2px;
    text-decoration-color: rgba(255, 107, 107, 0.6);
  }

  .corrected { border-color: rgba(78, 201, 163, 0.25); }
  .corrected .text-block { color: var(--text); }
  .corrected b, .corrected .add {
    color: var(--success);
    font-weight: 700;
    background: var(--success-bg);
    padding: 1px 5px;
    border-radius: 6px;
  }

  .explain { background: var(--card-2); }
  .explain .text-block { font-size: 15px; color: var(--text); }

  .err-item {
    display: flex;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .err-item:last-child { border-bottom: none; padding-bottom: 0; }
  .err-item:first-child { padding-top: 0; }
  .err-num {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 7px;
    background: var(--accent);
    color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-dim);
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .empty .big { font-size: 46px; margin-bottom: 14px; }
  .empty h2 { font-size: 18px; color: var(--text); margin-bottom: 6px; }

  .perfect {
    text-align: center;
    padding: 40px 20px;
  }
  .perfect .big { font-size: 52px; margin-bottom: 12px; }
  .perfect h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .perfect p { color: var(--text-dim); font-size: 14px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="empty">
    <div class="big">📭</div>
    <h2>Нет данных для разбора</h2>
    <p>Открой разбор из сообщения с исправлением</p>
  </div>
</div>

<script>
  // Инициализация Telegram WebApp
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // Читаем данные из URL-параметров
  function getParam(name) {
    const p = new URLSearchParams(window.location.search);
    const val = p.get(name);
    return val ? decodeURIComponent(val) : '';
  }

  const original = getParam('original');     // текст юзера (с <s> тегами для ошибок)
  const corrected = getParam('corrected');   // исправленный текст (с <b> тегами)
  const explanation = getParam('explanation'); // объяснение ошибок (строки через |)

  const app = document.getElementById('app');

  function escapeButKeepTags(str) {
    // Разрешаем только <s>, </s>, <b>, </b> — остальное экранируем
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/&lt;s&gt;/g, '<s>')
      .replace(/&lt;\/s&gt;/g, '</s>')
      .replace(/&lt;b&gt;/g, '<b>')
      .replace(/&lt;\/b&gt;/g, '</b>');
  }

  if (!original && !corrected) {
    // Дефолтное состояние уже в HTML
  } else if (!explanation && !original) {
    // Идеальный текст без ошибок
    app.innerHTML = `
      <div class="perfect">
        <div class="big">✨</div>
        <h2>Без ошибок!</h2>
        <p>Отличная работа — так держать 🎯</p>
      </div>`;
  } else {
    // Разбираем объяснения: каждая ошибка отделена символом |
    const errors = explanation ? explanation.split('|').map(e => e.trim()).filter(Boolean) : [];
    const errorsHtml = errors.length
      ? errors.map((e, i) => `
          <div class="err-item">
            <div class="err-num">${i + 1}</div>
            <div class="text-block">${escapeButKeepTags(e)}</div>
          </div>`).join('')
      : '<div class="text-block" style="color:var(--text-dim)">Подробного разбора нет</div>';

    app.innerHTML = `
      <div class="header">
        <div class="dot">📚</div>
        <div>
          <h1>Разбор ошибок</h1>
          <p>Сравни свой текст с правильным</p>
        </div>
      </div>

      <div class="card original">
        <div class="label"><span class="ic">✏️</span> Твой вариант</div>
        <div class="text-block">${escapeButKeepTags(original || '—')}</div>
      </div>

      <div class="card corrected">
        <div class="label"><span class="ic">✅</span> Правильно</div>
        <div class="text-block">${escapeButKeepTags(corrected || '—')}</div>
      </div>

      <div class="card explain">
        <div class="label"><span class="ic">💡</span> Объяснение</div>
        ${errorsHtml}
      </div>`;
  }
</script>
</body>
</html>
