<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Promptly — Подсказка ответа</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0f1115; --card: #1a1d24; --card-2: #21252e; --text: #e8eaed;
    --text-dim: #9aa0aa; --accent: #5eb5f7; --accent-2: #7b6ef6;
    --success: #4ec9a3; --success-bg: rgba(78, 201, 163, 0.12);
    --warm: #f7b955;
    --border: rgba(255, 255, 255, 0.07); --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.55;
    padding: 20px 16px 120px; min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; opacity: 0; animation: fadeUp 0.5s ease forwards; }
  .header .dot {
    width: 36px; height: 36px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    box-shadow: 0 4px 14px rgba(94, 181, 247, 0.3);
  }
  .header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--text-dim); margin-top: 1px; }
  .context-card {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 18px;
    font-size: 14px; color: var(--text-dim);
    opacity: 0; animation: fadeUp 0.5s ease forwards; animation-delay: 0.08s;
  }
  .context-card .ctx-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-dim); margin-bottom: 4px;
  }
  .context-card .ctx-text { color: var(--text); font-style: italic; }
  .variant {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
    opacity: 0; animation: fadeUp 0.5s ease forwards;
  }
  .variant:nth-of-type(1) { animation-delay: 0.16s; }
  .variant:nth-of-type(2) { animation-delay: 0.24s; }
  .variant:nth-of-type(3) { animation-delay: 0.32s; }
  .variant-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 8px;
    text-transform: uppercase;
  }
  .badge.b-easy { background: rgba(78, 201, 163, 0.15); color: var(--success); }
  .badge.b-mid  { background: rgba(94, 181, 247, 0.15); color: var(--accent); }
  .badge.b-hard { background: rgba(247, 185, 85, 0.15); color: var(--warm); }
  .variant-text { font-size: 17px; line-height: 1.7; margin-bottom: 8px; }

  /* кликабельные слова внутри варианта */
  .word { display: inline; cursor: pointer; border-radius: 5px; padding: 1px 2px; transition: background 0.15s, color 0.15s; }
  .word:active, .word.active { background: var(--accent); color: #fff; }

  .variant-translation {
    font-size: 14px; color: var(--success);
    background: var(--success-bg); padding: 8px 12px;
    border-radius: 9px; margin-bottom: 12px;
    display: none; line-height: 1.5;
  }
  .variant-translation.show { display: block; animation: fadeUp 0.3s ease forwards; }
  .toggle-btn, .send-btn, .translate-btn {
    border: none; font-family: inherit; font-size: 13px; font-weight: 600;
    border-radius: 11px; cursor: pointer; padding: 9px 14px;
    transition: transform 0.12s, opacity 0.15s, background 0.15s;
  }
  .toggle-btn, .translate-btn { background: var(--card-2); color: var(--text-dim); }
  .toggle-btn:active, .translate-btn:active { transform: scale(0.97); }
  .toggle-btn.open { background: rgba(94, 181, 247, 0.18); color: var(--accent); }
  .translate-btn.active { background: rgba(78, 201, 163, 0.18); color: var(--success); }
  .send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; padding: 9px 16px;
  }
  .send-btn:active { transform: scale(0.97); }
  .send-btn.sent { background: var(--success); }
  .actions { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .spinner-small {
    display: inline-block; width: 11px; height: 11px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  .breakdown {
    margin-top: 14px; background: var(--card-2); border-radius: 12px;
    padding: 0 14px; max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease;
  }
  .breakdown.show { max-height: 1000px; padding: 14px; }
  .breakdown h4 {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 8px;
  }
  .breakdown p { font-size: 14px; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
  .breakdown p:last-child { margin-bottom: 0; }
  .loader { text-align: center; padding: 60px 20px; opacity: 0; animation: fadeUp 0.5s ease forwards; }
  .loader .spinner-big {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite;
  }
  .loader p { color: var(--text-dim); font-size: 14px; }
  .empty { text-align: center; padding: 50px 20px; color: var(--text-dim); opacity: 0; animation: fadeUp 0.5s ease forwards; }
  .empty .big { font-size: 46px; margin-bottom: 14px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120%);
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; font-weight: 500;
    padding: 12px 18px; border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1); z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== всплывающая панель слова (как в voice.html) ===== */
  .word-popup {
    position: fixed; left: 0; right: 0; bottom: 0; background: var(--card);
    border-top: 1px solid var(--border); border-radius: 22px 22px 0 0;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
    box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.45); transform: translateY(110%);
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1); z-index: 250;
    max-height: 78vh; overflow-y: auto;
  }
  .word-popup.show { transform: translateY(0); }
  .pop-close {
    position: absolute; top: 14px; right: 16px; width: 30px; height: 30px; border-radius: 50%;
    background: var(--card-2); border: none; color: var(--text-dim); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }
  .pop-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; padding-right: 40px; }
  .pop-orig { font-size: 24px; font-weight: 700; }
  .pop-audio {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: rgba(94, 181, 247, 0.15); border: none; color: var(--accent);
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s;
  }
  .pop-audio:active { transform: scale(0.9); }
  .pop-audio:disabled { opacity: 0.3; cursor: default; }
  .pop-phonetic { font-size: 15px; color: var(--text-dim); font-style: italic; }
  .pop-trans { font-size: 18px; color: var(--success); font-weight: 600; margin-bottom: 14px; min-height: 24px; }
  .pop-save {
    width: 100%; padding: 13px; border: none; border-radius: 13px;
    background: rgba(247, 185, 85, 0.15); color: var(--warm);
    font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    margin-bottom: 14px; transition: transform 0.12s, background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .pop-save:active { transform: scale(0.98); }
  .pop-save.saved { background: rgba(78, 201, 163, 0.15); color: var(--success); }
  .pos-group { margin-bottom: 14px; }
  .pos-tag {
    display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 3px 9px; border-radius: 7px;
    background: rgba(123, 110, 246, 0.18); color: var(--accent-2); margin-bottom: 8px;
  }
  .def-item { margin-bottom: 9px; padding-left: 2px; }
  .def-text { font-size: 14px; color: var(--text); line-height: 1.5; }
  .def-example { font-size: 13px; color: var(--text-dim); font-style: italic; margin-top: 3px; }
  .def-example b { color: var(--accent); font-style: normal; font-weight: 700; }
  .def-example::before { content: '„'; } .def-example::after { content: '"'; }
  .pop-loading { color: var(--text-dim); font-size: 14px; padding: 8px 0; }
  .pop-nodict { color: var(--text-dim); font-size: 13px; font-style: italic; }
  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text-dim);
    border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
  }

  /* ===== конструктор ответа (C5) ===== */
  .constructor { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-top: 4px; opacity: 0; animation: fadeUp 0.5s ease forwards; animation-delay: 0.4s; }
  .constructor h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .constructor .sub { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.45; }
  .own-text { width: 100%; min-height: 84px; background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); font-family: inherit; font-size: 15px; line-height: 1.5; resize: vertical; outline: none; }
  .own-text:focus { border-color: var(--accent); }
  .check-btn { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.12s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .check-btn:active { transform: scale(0.98); }
  .check-btn:disabled { opacity: 0.6; cursor: default; }
  .check-result { margin-top: 14px; display: none; }
  .check-result.show { display: block; animation: fadeUp 0.3s ease forwards; }
  .cr-block { background: var(--card-2); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .cr-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px; }
  .cr-text { font-size: 16px; line-height: 1.55; }
  .cr-ok { color: var(--success); font-weight: 600; }
  .cr-feedback { font-size: 14px; color: var(--text); line-height: 1.5; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loader">
    <div class="spinner-big"></div>
    <p>Подбираю варианты ответа...</p>
  </div>
</div>
<div class="toast" id="toast"></div>

<div class="word-popup" id="popup">
  <button class="pop-close" id="popClose">×</button>
  <div class="pop-top">
    <span class="pop-orig" id="popOrig"></span>
    <button class="pop-audio" id="popAudio" title="Произношение">🔊</button>
    <span class="pop-phonetic" id="popPhonetic"></span>
  </div>
  <div class="pop-trans" id="popTrans"></div>
  <button class="pop-save" id="popSave">⭐ Сохранить в словарь</button>
  <div id="popDict"></div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const API = 'https://promptly-miniapp.vercel.app';
  const tgId = tg?.initDataUnsafe?.user?.id || null;

  function getParam(name) {
    const p = new URLSearchParams(window.location.search);
    const val = p.get(name);
    return val ? decodeURIComponent(val) : '';
  }

  const botMessage = getParam('bot');
  const variantsRaw = getParam('variants');
  const app = document.getElementById('app');
  const toast = document.getElementById('toast');
  const translationCache = {};
  const dictCache = {};

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
  function escapeHtml(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  async function translateGoogle(text) {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=' +
      encodeURIComponent(text);
    const res = await fetch(url);
    const data = await res.json();
    if (Array.isArray(data) && Array.isArray(data[0])) {
      return data[0].map(chunk => chunk[0]).join('');
    }
    return '';
  }
  async function translateMyMemory(text) {
    const url = 'https://api.mymemory.translated.net/get?q=' +
      encodeURIComponent(text) + '&langpair=en|ru&de=promptly@example.com';
    const res = await fetch(url);
    const data = await res.json();
    return data?.responseData?.translatedText || '';
  }
  async function translateFallback(text) {
    const key = text.toLowerCase().trim();
    if (translationCache[key]) return translationCache[key];
    let result = '';
    try { result = await translateGoogle(text); } catch(e) {}
    if (!result) { try { result = await translateMyMemory(text); } catch(e) {} }
    if (!result) result = '(перевод недоступен)';
    translationCache[key] = result;
    return result;
  }
  async function copyToClipboard(text) {
    try { await navigator.clipboard.writeText(text); return true; }
    catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); document.body.removeChild(ta); return true; }
      catch (e2) { document.body.removeChild(ta); return false; }
    }
  }

  // ===== словарь (Free Dictionary API) =====
  async function lookupDict(word) {
    const key = word.toLowerCase().trim();
    if (dictCache[key] !== undefined) return dictCache[key];
    try {
      const res = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(key));
      if (!res.ok) { dictCache[key] = null; return null; }
      const data = await res.json();
      if (!Array.isArray(data) || !data[0]) { dictCache[key] = null; return null; }
      const entry = data[0];
      let phonetic = entry.phonetic || '';
      let audio = '';
      if (Array.isArray(entry.phonetics)) {
        for (const p of entry.phonetics) {
          if (!phonetic && p.text) phonetic = p.text;
          if (!audio && p.audio) audio = p.audio;
        }
      }
      if (audio && audio.startsWith('//')) audio = 'https:' + audio;
      const meanings = [];
      if (Array.isArray(entry.meanings)) {
        for (const m of entry.meanings.slice(0, 3)) {
          const defs = [];
          if (Array.isArray(m.definitions)) {
            for (const d of m.definitions.slice(0, 2)) {
              defs.push({ definition: d.definition || '', example: d.example || '' });
            }
          }
          meanings.push({ pos: m.partOfSpeech || '', defs });
        }
      }
      const result = { phonetic, audio, meanings };
      dictCache[key] = result;
      return result;
    } catch(e) { dictCache[key] = null; return null; }
  }

  const posRu = {
    'noun':'существительное','verb':'глагол','adjective':'прилагательное','adverb':'наречие',
    'pronoun':'местоимение','preposition':'предлог','conjunction':'союз','interjection':'междометие',
    'exclamation':'восклицание','determiner':'определитель','article':'артикль','numeral':'числительное',
    'intransitive verb':'непереходный глагол','transitive verb':'переходный глагол'
  };

  function highlightWord(example, word) {
    const safe = escapeHtml(example);
    if (!word) return safe;
    const base = word.toLowerCase().replace(/[^a-z]/g, '');
    if (base.length < 2) return safe;
    const re = new RegExp('\\b(' + base + '[a-z]{0,4})\\b', 'gi');
    return safe.replace(re, '<b>$1</b>');
  }

  // Превращает обычный текст варианта в кликабельные слова
  function clickableWords(text) {
    const tokens = (text || '').split(/(\s+)/);
    return tokens.map(tok => {
      if (tok === '' || /^\s+$/.test(tok)) return tok;
      const clean = tok.replace(/[.,!?;:"'«»()]/g, '');
      if (!clean) return escapeHtml(tok);
      return '<span class="word" data-word="' + clean.replace(/"/g, '&quot;') + '">' + escapeHtml(tok) + '</span>';
    }).join('');
  }

  // ===== всплывашка слова =====
  function initWordPopup() {
    const popup = document.getElementById('popup');
    const popOrig = document.getElementById('popOrig');
    const popPhonetic = document.getElementById('popPhonetic');
    const popTrans = document.getElementById('popTrans');
    const popDict = document.getElementById('popDict');
    const popAudio = document.getElementById('popAudio');
    const popSave = document.getElementById('popSave');
    let activeWord = null;
    let currentAudioUrl = '';
    let currentWord = '';
    let currentTrans = '';
    let currentPhonetic = '';

    popAudio.addEventListener('click', () => {
      if (!currentAudioUrl) return;
      try { new Audio(currentAudioUrl).play(); } catch(e){}
    });

    popSave.addEventListener('click', async () => {
      if (!currentWord) return;
      if (!tgId) { popSave.textContent = '⚠️ Открой из Telegram'; return; }
      popSave.disabled = true;
      popSave.innerHTML = '<span class="spinner"></span> Сохраняю...';
      try {
        const res = await fetch(API + '/api/vocab-add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tgId: tgId, word: currentWord, translation: currentTrans, phonetic: currentPhonetic })
        });
        const data = await res.json();
        if (data.ok && data.added) {
          popSave.classList.add('saved');
          popSave.textContent = '✓ Добавлено в словарь';
        } else if (data.ok && !data.added) {
          popSave.classList.add('saved');
          popSave.textContent = '✓ Уже в словаре';
        } else {
          popSave.textContent = '⚠️ Не получилось';
          popSave.disabled = false;
        }
      } catch(e) {
        popSave.textContent = '⚠️ Ошибка сети';
        popSave.disabled = false;
      }
    });

    document.querySelectorAll('.word').forEach(el => {
      el.addEventListener('click', async () => {
        const word = el.getAttribute('data-word');
        if (activeWord) activeWord.classList.remove('active');
        el.classList.add('active');
        activeWord = el;

        currentWord = word.toLowerCase();
        currentTrans = '';
        currentPhonetic = '';
        popOrig.textContent = word;
        popPhonetic.textContent = '';
        popTrans.innerHTML = '<span class="spinner"></span>';
        popDict.innerHTML = '<div class="pop-loading">Загружаю разбор...</div>';
        currentAudioUrl = '';
        popAudio.disabled = true;
        popSave.disabled = false;
        popSave.classList.remove('saved');
        popSave.textContent = '⭐ Сохранить в словарь';
        popup.classList.add('show');

        translateFallback(word).then(tr => { popTrans.textContent = tr; currentTrans = tr; });

        const dict = await lookupDict(word);
        if (!dict) {
          popDict.innerHTML = '<div class="pop-nodict">Подробный разбор недоступен для этого слова</div>';
          return;
        }
        if (dict.phonetic) { popPhonetic.textContent = dict.phonetic; currentPhonetic = dict.phonetic; }
        if (dict.audio) { currentAudioUrl = dict.audio; popAudio.disabled = false; }
        else { popAudio.disabled = true; }

        const defsToTranslate = [];
        for (const m of dict.meanings) for (const d of m.defs) if (d.definition) defsToTranslate.push(d.definition);
        const translatedDefs = {};
        await Promise.all(defsToTranslate.map(async (def) => { translatedDefs[def] = await translateFallback(def); }));

        let html = '';
        for (const m of dict.meanings) {
          if (!m.defs.length) continue;
          const posLabel = posRu[m.pos] || m.pos;
          html += '<div class="pos-group"><span class="pos-tag">' + escapeHtml(posLabel) + '</span>';
          for (const d of m.defs) {
            const defRu = translatedDefs[d.definition] || escapeHtml(d.definition);
            html += '<div class="def-item"><div class="def-text">' + escapeHtml(defRu) + '</div>';
            if (d.example) html += '<div class="def-example">' + highlightWord(d.example, word) + '</div>';
            html += '</div>';
          }
          html += '</div>';
        }
        popDict.innerHTML = html || '<div class="pop-nodict">Определения не найдены</div>';
      });
    });

    document.getElementById('popClose').addEventListener('click', () => {
      popup.classList.remove('show');
      if (activeWord) { activeWord.classList.remove('active'); activeWord = null; }
    });
  }

  if (!variantsRaw) {
    app.innerHTML = '<div class="empty"><div class="big">💬</div><h2>Нет данных</h2><p>Открой из голосового сообщения</p></div>';
  } else {
    let variants = [];
    try { variants = JSON.parse(variantsRaw); } catch(e) { variants = []; }

    if (!Array.isArray(variants) || variants.length === 0) {
      app.innerHTML = '<div class="empty"><div class="big">😕</div><h2>Не получилось подобрать варианты</h2><p>Попробуй ответить своими словами</p></div>';
    } else {
      const levels = [
        { key: 'easy', label: 'Простой', cls: 'b-easy' },
        { key: 'mid',  label: 'Средний', cls: 'b-mid' },
        { key: 'hard', label: 'Развёрнутый', cls: 'b-hard' }
      ];

      const variantsHtml = variants.map((v, i) => {
        const lvl = levels[i] || { label: 'Вариант ' + (i+1), cls: 'b-mid' };
        const text = v.text || '';
        const grammar = v.grammar || '';
        const vocab = v.vocab || '';
        const reason = v.reason || '';
        const hasBreakdown = grammar || vocab || reason;

        return '' +
          '<div class="variant">' +
            '<div class="variant-head"><span class="badge ' + lvl.cls + '">' + lvl.label + '</span></div>' +
            '<div class="variant-text">' + clickableWords(text) + '</div>' +
            '<div class="variant-translation" id="tr-' + i + '"></div>' +
            '<div class="actions">' +
              '<button class="translate-btn" data-i="' + i + '">🌐 Перевод</button>' +
              (hasBreakdown ? '<button class="toggle-btn" data-i="' + i + '">Разобрать ✨</button>' : '') +
              '<button class="send-btn" data-i="' + i + '">Скопировать →</button>' +
            '</div>' +
            (hasBreakdown ? (
              '<div class="breakdown" id="bd-' + i + '">' +
                (reason ? '<h4>💡 Почему так</h4><p>' + escapeHtml(reason) + '</p>' : '') +
                (grammar ? '<h4>📐 Грамматика</h4><p>' + escapeHtml(grammar) + '</p>' : '') +
                (vocab ? '<h4>📚 Полезные слова</h4><p>' + escapeHtml(vocab) + '</p>' : '') +
              '</div>'
            ) : '') +
          '</div>';
      }).join('');

      app.innerHTML =
        '<div class="header"><div class="dot">💬</div><div><h1>Варианты ответа</h1><p>Тапни на слово • выбери • отправь</p></div></div>' +
        (botMessage ? (
          '<div class="context-card"><div class="ctx-label">📨 Promptly спросил</div><div class="ctx-text">"' + escapeHtml(botMessage) + '"</div></div>'
        ) : '') +
        variantsHtml +
        '<div class="constructor">' +
          '<h3>✍️ Составь свой ответ</h3>' +
          '<div class="sub">Напиши ответ сам — я проверю грамматику и подскажу, как звучит естественнее.</div>' +
          '<textarea class="own-text" id="ownText" placeholder="Type your answer in English..."></textarea>' +
          '<button class="check-btn" id="checkBtn">Проверить ✨</button>' +
          '<div class="check-result" id="checkResult"></div>' +
        '</div>';

      initWordPopup();

      // Перевод варианта — сначала готовый от GPT, потом fallback Google
      document.querySelectorAll('.translate-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const i = parseInt(btn.getAttribute('data-i'));
          const trBox = document.getElementById('tr-' + i);
          const isShown = trBox.classList.contains('show');
          if (isShown) {
            trBox.classList.remove('show');
            btn.classList.remove('active');
            btn.textContent = '🌐 Перевод';
            return;
          }

          // 1. Сначала пробуем готовый перевод от GPT
          const ready = variants[i]?.translation;
          if (ready && ready.trim().length > 0) {
            trBox.textContent = ready;
            trBox.classList.add('show');
            btn.classList.add('active');
            btn.textContent = '🌐 Скрыть перевод';
            return;
          }

          // 2. Если нет — fallback на Google
          btn.innerHTML = '<span class="spinner-small"></span>Перевожу';
          btn.disabled = true;
          const tr = await translateFallback(variants[i]?.text || '');
          trBox.textContent = tr;
          trBox.classList.add('show');
          btn.disabled = false;
          btn.classList.add('active');
          btn.textContent = '🌐 Скрыть перевод';
        });
      });

      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = btn.getAttribute('data-i');
          const bd = document.getElementById('bd-' + i);
          const open = bd.classList.contains('show');
          if (open) { bd.classList.remove('show'); btn.classList.remove('open'); btn.textContent = 'Разобрать ✨'; }
          else { bd.classList.add('show'); btn.classList.add('open'); btn.textContent = 'Свернуть ↑'; }
        });
      });

      document.querySelectorAll('.send-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const i = parseInt(btn.getAttribute('data-i'));
          const text = variants[i]?.text || '';
          if (!text) return;
          const ok = await copyToClipboard(text);
          if (ok) {
            btn.textContent = 'Скопировано ✓';
            btn.classList.add('sent');
            showToast('Текст скопирован — вставь в чат');
            setTimeout(() => { if (tg && tg.close) tg.close(); }, 1200);
          } else {
            showToast('Не получилось скопировать');
          }
        });
      });

      // ===== КОНСТРУКТОР ОТВЕТА (C5) =====
      const checkBtn = document.getElementById('checkBtn');
      if (checkBtn) {
        checkBtn.addEventListener('click', async () => {
          const ta = document.getElementById('ownText');
          const own = (ta.value || '').trim();
          const resultBox = document.getElementById('checkResult');
          if (!own) { showToast('Сначала напиши ответ'); return; }
          if (!tgId) { showToast('Открой из Telegram'); return; }
          checkBtn.disabled = true;
          checkBtn.innerHTML = '<span class="spinner-small"></span>Проверяю';
          try {
            const res = await fetch(API + '/api/check', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ tgId: tgId, text: own, question: botMessage || '' })
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error || 'fail');
            const corrected = (data.corrected || own).toString();
            const feedback = (data.feedback || '').toString();
            const betterRaw = (data.better || '').toString();
            const better = (betterRaw.trim() && betterRaw.trim().toLowerCase() !== corrected.trim().toLowerCase()) ? betterRaw : '';
            let html = '';
            if (data.has_errors) {
              html += '<div class="cr-block"><div class="cr-label">✅ Исправлено</div><div class="cr-text">' + escapeHtml(corrected) + '</div></div>';
            } else {
              html += '<div class="cr-block"><div class="cr-text cr-ok">👍 Грамматика в порядке!</div></div>';
            }
            if (better) html += '<div class="cr-block"><div class="cr-label">💬 Звучит естественнее</div><div class="cr-text">' + escapeHtml(better) + '</div></div>';
            if (feedback) html += '<div class="cr-block"><div class="cr-label">📝 Разбор</div><div class="cr-feedback">' + escapeHtml(feedback) + '</div></div>';
            html += '<button class="send-btn" id="copyOwn" style="width:100%; justify-content:center;">Скопировать ответ →</button>';
            resultBox.innerHTML = html;
            resultBox.classList.add('show');
            const copyOwn = document.getElementById('copyOwn');
            if (copyOwn) copyOwn.addEventListener('click', async () => {
              const toCopy = better || corrected;
              const ok = await copyToClipboard(toCopy);
              if (ok) { copyOwn.textContent = 'Скопировано ✓'; copyOwn.classList.add('sent'); showToast('Скопировано — вставь в чат'); }
              else showToast('Не получилось скопировать');
            });
          } catch (e) {
            showToast('Не удалось проверить, попробуй ещё раз');
          } finally {
            checkBtn.disabled = false;
            checkBtn.innerHTML = 'Проверить ✨';
          }
        });
      }
    }
  }
</script>
</body>
</html>
