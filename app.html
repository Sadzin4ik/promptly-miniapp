<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Promptly</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg:#0f1115; --card:#1a1d24; --card-2:#21252e; --text:#e8eaed;
    --text-dim:#9aa0aa; --accent:#5eb5f7; --accent-2:#7b6ef6; --success:#4ec9a3;
    --warm:#f7b955; --fire:#ff7a3c; --danger:#f76e6e; --border:rgba(255,255,255,0.07); --radius:18px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5; min-height:100vh;
    -webkit-font-smoothing:antialiased; padding-bottom:78px;
  }
  .screen { max-width:560px; margin:0 auto; padding:20px 16px; display:none; }
  .screen.active { display:block; }

  .hero {
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    border-radius:22px; padding:24px; margin-bottom:16px; position:relative; overflow:hidden;
    opacity:0; animation:fadeUp 0.5s ease forwards;
  }
  .hero::after { content:''; position:absolute; right:-30px; top:-30px; width:160px; height:160px; background:rgba(255,255,255,0.12); border-radius:50%; }
  .hero::before { content:''; position:absolute; right:20px; bottom:-40px; width:110px; height:110px; background:rgba(255,255,255,0.08); border-radius:50%; }
  .hero-label { font-size:13px; color:rgba(255,255,255,0.85); font-weight:600; letter-spacing:0.3px; margin-bottom:2px; }
  .hero-streak { font-size:56px; font-weight:800; color:#fff; line-height:1; display:flex; align-items:center; gap:10px; }
  .hero-streak .fire { font-size:40px; }
  .hero-days { font-size:14px; color:rgba(255,255,255,0.9); font-weight:600; margin-top:6px; text-transform:uppercase; letter-spacing:0.5px; }
  .hero-name { font-size:22px; font-weight:800; color:#fff; margin-top:14px; position:relative; z-index:1; }
  .hero-level { display:inline-block; margin-top:6px; font-size:12px; font-weight:700; color:#fff; background:rgba(255,255,255,0.2); padding:3px 11px; border-radius:8px; text-transform:uppercase; letter-spacing:0.5px; }

  .section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-dim); margin:18px 4px 12px; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; opacity:0; animation:fadeUp 0.5s ease forwards; }
  .stat-card:nth-child(1){animation-delay:0.05s} .stat-card:nth-child(2){animation-delay:0.1s} .stat-card:nth-child(3){animation-delay:0.15s} .stat-card:nth-child(4){animation-delay:0.2s}
  .stat-label { font-size:12px; color:var(--text-dim); font-weight:600; margin-bottom:6px; }
  .stat-value { font-size:28px; font-weight:800; color:var(--text); line-height:1; }
  .stat-value .unit { font-size:15px; color:var(--text-dim); font-weight:600; }
  .stat-card.accent .stat-value { color:var(--accent); }
  .stat-card.success .stat-value { color:var(--success); }
  .stat-card.warm .stat-value { color:var(--warm); }
  .correctness-bar { margin-top:8px; height:6px; background:var(--card-2); border-radius:3px; overflow:hidden; }
  .correctness-fill { height:100%; background:linear-gradient(90deg,var(--success),var(--accent)); border-radius:3px; transition:width 0.8s ease; }

  /* СЛОВАРЬ */
  .vocab-head { display:flex; gap:12px; margin-bottom:16px; }
  .vocab-stat { flex:1; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; text-align:center; }
  .vocab-stat .num { font-size:30px; font-weight:800; line-height:1; }
  .vocab-stat .lbl { font-size:12px; color:var(--text-dim); font-weight:600; margin-top:5px; }
  .vocab-stat.due .num { color:var(--warm); }
  .vocab-stat.total .num { color:var(--accent); }
  .review-btn {
    width:100%; padding:16px; border:none; border-radius:15px; font-family:inherit;
    background:linear-gradient(135deg,var(--warm),var(--fire)); color:#fff;
    font-size:16px; font-weight:700; cursor:pointer; margin-bottom:18px;
    transition:transform 0.12s; box-shadow:0 4px 16px rgba(247,122,60,0.3);
  }
  .review-btn:active { transform:scale(0.98); }
  .review-btn:disabled { background:var(--card-2); color:var(--text-dim); box-shadow:none; cursor:default; }

  .word-row {
    display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:13px 15px; margin-bottom:9px; opacity:0; animation:fadeUp 0.4s ease forwards;
  }
  .word-row .w-main { flex:1; min-width:0; }
  .word-row .w-en { font-size:16px; font-weight:700; }
  .word-row .w-ru { font-size:13px; color:var(--text-dim); margin-top:2px; }
  .word-row .w-status { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; padding:3px 8px; border-radius:6px; white-space:nowrap; }
  .w-status.new { background:rgba(94,181,247,0.16); color:var(--accent); }
  .w-status.learning { background:rgba(247,185,85,0.16); color:var(--warm); }
  .w-status.learned { background:rgba(78,201,163,0.16); color:var(--success); }

  /* РЕЖИМ КАРТОЧЕК */
  .flashcard-overlay {
    position:fixed; inset:0; background:var(--bg); z-index:200; display:none;
    flex-direction:column; padding:20px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .flashcard-overlay.show { display:flex; }
  .fc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .fc-progress { font-size:14px; color:var(--text-dim); font-weight:600; }
  .fc-close { width:34px; height:34px; border-radius:50%; background:var(--card); border:none; color:var(--text-dim); font-size:20px; cursor:pointer; }
  .fc-card {
    flex:1; background:var(--card); border:1px solid var(--border); border-radius:24px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:30px; cursor:pointer; position:relative; margin-bottom:18px; text-align:center;
    transition:transform 0.15s;
  }
  .fc-card:active { transform:scale(0.99); }
  .fc-word { font-size:38px; font-weight:800; }
  .fc-phonetic { font-size:17px; color:var(--text-dim); font-style:italic; margin-top:10px; }
  .fc-flip-hint { position:absolute; bottom:22px; font-size:13px; color:var(--text-dim); }
  .fc-divider { width:50px; height:3px; background:var(--border); border-radius:2px; margin:20px 0; }
  .fc-translation { font-size:26px; font-weight:700; color:var(--success); }
  .fc-audio { margin-top:16px; width:46px; height:46px; border-radius:50%; background:rgba(94,181,247,0.15); border:none; color:var(--accent); font-size:20px; cursor:pointer; }
  .fc-actions { display:flex; gap:12px; }
  .fc-btn { flex:1; padding:18px; border:none; border-radius:16px; font-family:inherit; font-size:16px; font-weight:700; cursor:pointer; transition:transform 0.12s; }
  .fc-btn:active { transform:scale(0.97); }
  .fc-btn.dont { background:rgba(247,110,110,0.16); color:var(--danger); }
  .fc-btn.know { background:rgba(78,201,163,0.16); color:var(--success); }
  .fc-done { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .fc-done .big { font-size:60px; margin-bottom:18px; }
  .fc-done h2 { font-size:24px; margin-bottom:10px; }
  .fc-done p { color:var(--text-dim); font-size:15px; }

  .navbar { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:10px 0 calc(10px + env(safe-area-inset-bottom)); z-index:50; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; color:var(--text-dim); font-family:inherit; transition:color 0.15s; }
  .nav-item.active { color:var(--accent); }
  .nav-icon { font-size:21px; }
  .nav-label { font-size:11px; font-weight:600; }

  .loader { text-align:center; padding:70px 20px; }
  .loader .spin { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; margin:0 auto 14px; animation:spin 0.8s linear infinite; }
  .loader p { color:var(--text-dim); font-size:14px; }
  .soon { text-align:center; padding:80px 24px; color:var(--text-dim); }
  .soon .big { font-size:48px; margin-bottom:16px; }
  .soon h2 { font-size:20px; color:var(--text); margin-bottom:8px; }
  .soon p { font-size:14px; }

  /* ПРОГРЕСС */
  .badge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .badge-card { border:1px solid var(--border); border-radius:14px; padding:14px 8px; text-align:center; opacity:0; animation:fadeUp 0.4s ease forwards; }
  .badge-card.on { border-color:rgba(78,201,163,0.3); background:rgba(78,201,163,0.06); }
  .badge-card.off { background:var(--card-2); }
  .badge-ico { font-size:26px; margin-bottom:6px; }
  .badge-card.off .badge-ico { opacity:0.55; }
  .badge-name { font-size:11px; font-weight:600; line-height:1.25; }
  .badge-card.off .badge-name { color:var(--text-dim); }
  .mastery-bar { display:flex; height:14px; border-radius:7px; overflow:hidden; background:var(--card-2); margin-bottom:12px; }
  .mastery-bar .seg { height:100%; transition:width 0.6s ease; }
  .mastery-bar .seg.new { background:var(--accent); }
  .mastery-bar .seg.learning { background:var(--warm); }
  .mastery-bar .seg.learned { background:var(--success); }
  .legend { display:flex; flex-wrap:wrap; gap:14px; font-size:13px; color:var(--text-dim); }
  .legend i.dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .legend .dot.new { background:var(--accent); }
  .legend .dot.learning { background:var(--warm); }
  .legend .dot.learned { background:var(--success); }
  .empty-hint { font-size:14px; color:var(--text-dim); line-height:1.5; }
  .bars { display:flex; align-items:flex-end; justify-content:space-between; gap:8px; }
  .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; }
  .bar-wrap { width:100%; height:100px; display:flex; align-items:flex-end; }
  .bar-fill { width:100%; background:linear-gradient(180deg,var(--accent),var(--accent-2)); border-radius:6px 6px 0 0; }
  .bar-num { font-size:12px; font-weight:700; margin-top:5px; min-height:14px; }
  .bar-lbl { font-size:11px; color:var(--text-dim); margin-top:2px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  .level-steps { display:flex; gap:5px; margin-top:10px; }
  .step-item { flex:1; padding:5px 0; text-align:center; font-size:11px; font-weight:700; border-radius:7px; background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.45); }
  .step-item.done { background:rgba(255,255,255,0.2); color:rgba(255,255,255,0.8); }
  .step-item.current { background:#fff; color:#3a3f8a; }
  .badge-progress-text { font-size:10px; color:var(--text-dim); margin:3px 0 2px; }
  .badge-mini-bar { height:3px; border-radius:2px; background:var(--border); overflow:hidden; margin-top:2px; }
  .badge-mini-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }
  .sub-status { border-radius:16px; padding:18px; margin-bottom:14px; text-align:center; }
  .sub-status.active { background:linear-gradient(135deg,rgba(78,201,163,0.18),rgba(94,181,247,0.12)); border:1px solid rgba(78,201,163,0.35); }
  .sub-status.free { background:var(--card-2); border:1px solid var(--border); }
  .sub-status-ico { font-size:36px; margin-bottom:8px; }
  .sub-status-title { font-size:16px; font-weight:700; color:var(--text); }
  .sub-status-until { font-size:13px; color:var(--text-dim); margin-top:4px; }
  .benefits-list { display:flex; flex-direction:column; gap:9px; }
  .benefit-item { display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text); }
  .benefit-ico { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
  .tariff-cards { display:flex; flex-direction:column; gap:10px; }
  .tariff-card { background:var(--card-2); border:1px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; }
  .tariff-card.featured { border-color:rgba(94,181,247,0.45); background:rgba(94,181,247,0.07); }
  .tariff-price { font-size:20px; font-weight:800; color:var(--accent); }
  .tariff-price .per { font-size:13px; font-weight:400; color:var(--text-dim); }
  .tariff-period { font-size:12px; color:var(--text-dim); margin-top:2px; }
  .tariff-badge { font-size:11px; font-weight:700; color:var(--accent); background:rgba(94,181,247,0.15); padding:3px 9px; border-radius:6px; flex-shrink:0; }
  .sub-btn { display:block; width:100%; padding:16px; background:linear-gradient(135deg,var(--accent),var(--purple)); border:none; border-radius:14px; color:#fff; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; margin-top:6px; }
  .tariff-popular { font-size:10px; font-weight:700; color:var(--accent); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
  .tariff-card { cursor:pointer; transition:transform 0.1s ease; }
  .tariff-card:active { transform:scale(0.98); }
  .ref-card { margin-top:16px; border-radius:18px; padding:20px; background:linear-gradient(135deg, rgba(139,124,255,0.18), rgba(94,181,247,0.12)); border:1px solid rgba(139,124,255,0.35); text-align:center; }
  .ref-card-ico { font-size:34px; margin-bottom:6px; line-height:1; }
  .ref-card-title { font-size:16px; font-weight:700; color:var(--text); }
  .ref-card-desc { font-size:13px; color:var(--text-dim); margin:8px 0 12px; line-height:1.5; }
  .ref-card-stat { font-size:12px; color:var(--text-dim); margin-bottom:14px; padding:6px 12px; background:rgba(255,255,255,0.05); border-radius:8px; display:inline-block; }
  .ref-btn { display:inline-block; padding:13px 28px; background:linear-gradient(135deg,#8b7cff,#6a5af0); color:#fff; border:none; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 6px 16px rgba(139,124,255,0.3); transition:transform .12s; font-family:inherit; }
  .ref-btn:active { transform:scale(0.97); }
  .ref-card.locked { background:linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)); border:1px solid rgba(255,255,255,0.08); }
  .ref-card.locked .ref-card-ico { filter:grayscale(0.4); opacity:0.85; }
  .ref-card.locked .ref-card-title { color:var(--text-dim); }
</style>
</head>
<body>

<div class="screen active" id="screen-profile">
  <div id="profileContent"><div class="loader"><div class="spin"></div><p>Загружаю профиль...</p></div></div>
</div>

<div class="screen" id="screen-vocab">
  <div id="vocabContent"><div class="loader"><div class="spin"></div><p>Загружаю словарь...</p></div></div>
</div>

<div class="screen" id="screen-progress">
  <div id="progressContent"><div class="loader"><div class="spin"></div><p>Загружаю прогресс...</p></div></div>
</div>

<div class="screen" id="screen-sub">
  <div id="subContent"><div class="loader"><div class="spin"></div><p>Загружаю подписку...</p></div></div>
</div>

<!-- Режим карточек -->
<div class="flashcard-overlay" id="flashcards">
  <div class="fc-top">
    <span class="fc-progress" id="fcProgress">0 / 0</span>
    <button class="fc-close" id="fcClose">×</button>
  </div>
  <div id="fcBody" style="flex:1; display:flex; flex-direction:column;">
    <div class="fc-card" id="fcCard">
      <div id="fcFront">
        <div class="fc-word" id="fcWord"></div>
        <div class="fc-phonetic" id="fcPhonetic"></div>
        <div class="fc-flip-hint">Нажми чтобы перевернуть</div>
      </div>
      <div id="fcBack" style="display:none; text-align:center;">
        <div class="fc-word" id="fcWordBack"></div>
        <div class="fc-divider" style="margin:18px auto;"></div>
        <div class="fc-translation" id="fcTranslation"></div>
        <button class="fc-audio" id="fcAudio">🔊</button>
      </div>
    </div>
    <div class="fc-actions" id="fcActions" style="display:none;">
      <button class="fc-btn dont" id="fcDont">Не знаю</button>
      <button class="fc-btn know" id="fcKnow">Знаю</button>
    </div>
  </div>
  <div class="fc-done" id="fcDone" style="display:none;">
    <div class="big">🎉</div>
    <h2>Повторение завершено!</h2>
    <p id="fcDoneText">Отличная работа</p>
  </div>
</div>

<div class="navbar">
  <button class="nav-item active" data-screen="profile"><span class="nav-icon">👤</span><span class="nav-label">Профиль</span></button>
  <button class="nav-item" data-screen="vocab"><span class="nav-icon">📚</span><span class="nav-label">Словарь</span></button>
  <button class="nav-item" data-screen="sub"><span class="nav-icon">💳</span><span class="nav-label">Подписка</span></button>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const API = 'https://promptly-miniapp.vercel.app';
  const tgId = tg?.initDataUnsafe?.user?.id || null;

  let vocabLoaded = false;

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.getAttribute('data-screen');
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('screen-' + target).classList.add('active');
      if (target === 'vocab') loadVocab();
      if (target === 'sub') loadSub();
    });
  });

  const levelRu = { beginner:'Начальный', intermediate:'Средний', advanced:'Продвинутый', a1:'A1 · Начальный', a2:'A2 · Элементарный', b1:'B1 · Средний', b2:'B2 · Выше среднего', c1:'C1 · Продвинутый', c2:'C2 · Свободный' };
  function pluralDays(n){const a=Math.abs(n)%100;const b=a%10;if(a>10&&a<20)return'дней';if(b>1&&b<5)return'дня';if(b===1)return'день';return'дней';}
  function pluralWords(n){const a=Math.abs(n)%100;const b=a%10;if(a>10&&a<20)return'слов';if(b>1&&b<5)return'слова';if(b===1)return'слово';return'слов';}

  // ====== ПРОФИЛЬ ======
  function tierBadge(name, value, tiers, unit) {
    let earned = null, next = tiers[0];
    for (let i = 0; i < tiers.length; i++) {
      if (value >= tiers[i].min) { earned = tiers[i]; next = tiers[i+1] || null; }
    }
    const ico = earned ? earned.ico : '🔒';
    const progress = next ? Math.min(Math.round(value / next.min * 100), 100) : 100;
    const label = next ? (value + ' / ' + next.min + ' ' + unit) : 'Максимум!';
    const barColor = !earned ? '#3a3f4b' : (next ? '#7b6ef6' : '#f0b429');
    return '<div class="badge-card ' + (earned ? 'on' : 'off') + '">' +
      '<div class="badge-ico">' + ico + '</div>' +
      '<div class="badge-name">' + name + '</div>' +
      '<div class="badge-progress-text">' + label + '</div>' +
      '<div class="badge-mini-bar"><div class="badge-mini-fill" style="width:' + progress + '%;background:' + barColor + '"></div></div>' +
    '</div>';
  }

  function weeklyBars(words) {
    const weeks = 6; const now = Date.now(); const WEEK = 604800000;
    const buckets = new Array(weeks).fill(0);
    words.forEach(w => { const t = w.added||0; if(!t)return; const idx = weeks-1-Math.floor((now-t)/WEEK); if(idx>=0&&idx<weeks)buckets[idx]++; });
    let maxBucket = 1; buckets.forEach(c => { if(c>maxBucket)maxBucket=c; });
    return buckets.map((c,i) => {
      const h = c>0 ? Math.max(Math.round(c/maxBucket*100),8) : 2;
      const label = i===weeks-1 ? 'сейчас' : (weeks-1-i)+'н';
      return '<div class="bar-col"><div class="bar-wrap"><div class="bar-fill" style="height:'+h+'px"></div></div><div class="bar-num">'+(c||'')+'</div><div class="bar-lbl">'+label+'</div></div>';
    }).join('');
  }

  async function loadProfile() {
    const content = document.getElementById('profileContent');
    if (!tgId) { content.innerHTML = '<div class="soon"><div class="big">🔒</div><h2>Открой из Telegram</h2><p>Профиль доступен только внутри бота</p></div>'; return; }
    content.innerHTML = '<div class="loader"><div class="spin"></div><p>Загружаю профиль...</p></div>';
    try {
      const [pRes, vRes] = await Promise.all([
        fetch(API + '/api/profile?tgId=' + tgId).then(r => r.json()),

  async function loadProgress() {

      ]);
      if (!pRes || !pRes.ok) throw new Error('profile');
      const words = (vRes && vRes.ok && Array.isArray(vRes.words)) ? vRes.words : [];
      const messages = pRes.messages || 0;
      const maxStreak = pRes.maxStreak || 0;
      const totalWords = words.length;
      const learned = words.filter(w => w.status === 'learned').length;

      const fresh = Math.max(0, totalWords - learned - learning);

      const ach = [

        { ico:'💬', name:'200 сообщений', earned: messages >= 200 },
        { ico:'📖', name:'10 слов', earned: totalWords >= 10 },
        { ico:'📖', name:'50 слов', earned: totalWords >= 50 },
        { ico:'🎓', name:'10 выучено', earned: learned >= 10 }
      ];
      const earnedCount = ach.filter(a => a.earned).length;
      const badgesHtml = ach.map((a, i) =>
        '<div class="badge-card ' + (a.earned ? 'on' : 'off') + '" style="animation-delay:' + (i * 0.04) + 's">' +
          '<div class="badge-ico">' + (a.earned ? a.ico : '🔒') + '</div>' +
          '<div class="badge-name">' + a.name + '</div>' +
        '</div>').join('');

      let masteryHtml;
      if (totalWords > 0) {
        const pct = n => (n / totalWords * 100);
        masteryHtml =
          '<div class="mastery-bar">' +
            '<div class="seg new" style="width:' + pct(fresh) + '%"></div>' +
            '<div class="seg learning" style="width:' + pct(learning) + '%"></div>' +
            '<div class="seg learned" style="width:' + pct(learned) + '%"></div>' +
          '</div>' +
          '<div class="legend">' +
            '<span><i class="dot new"></i>Новые: ' + fresh + '</span>' +
            '<span><i class="dot learning"></i>Учу: ' + learning + '</span>' +
            '<span><i class="dot learned"></i>Выучено: ' + learned + '</span>' +
          '</div>';
      } else {
        masteryHtml = '<div class="empty-hint">Пока нет сохранённых слов. Сохраняй слова из разбора и подсказок — и здесь появится прогресс по ним.</div>';
      }

      const weeks = 6;
      const now = Date.now();
      const WEEK = 7 * 24 * 60 * 60 * 1000;
      const buckets = new Array(weeks).fill(0);
      words.forEach(w => {
        const t = w.added || 0;
        if (!t) return;
        const idx = weeks - 1 - Math.floor((now - t) / WEEK);
        if (idx >= 0 && idx < weeks) buckets[idx]++;
      });
      let maxBucket = 1;
      buckets.forEach(c => { if (c > maxBucket) maxBucket = c; });
      const barsHtml = buckets.map((c, i) => {
        const h = c > 0 ? Math.max(Math.round(c / maxBucket * 100), 8) : 2;
        const label = (i === weeks - 1) ? 'сейчас' : (weeks - 1 - i) + 'н';
        return '<div class="bar-col"><div class="bar-wrap"><div class="bar-fill" style="height:' + h + 'px"></div></div>' +
          '<div class="bar-num">' + (c || '') + '</div><div class="bar-lbl">' + label + '</div></div>';
      }).join('');

      content.innerHTML =
        '<div class="section-title">Достижения · ' + earnedCount + ' из ' + ach.length + '</div>' +
        '<div class="badge-grid">' + badgesHtml + '</div>' +
        '<div class="section-title">Освоение словаря</div>' +
        '<div class="stat-card" style="animation-delay:0.05s">' + masteryHtml + '</div>' +
        '<div class="section-title">Рост словаря по неделям</div>' +
        '<div class="stat-card" style="animation-delay:0.1s"><div class="bars">' + barsHtml + '</div></div>';
    } catch(e) {
      content.innerHTML = '<div class="soon"><div class="big">😕</div><h2>Не удалось загрузить</h2><p>Попробуй позже</p></div>';
    }
  }

  // ====== РЕЖИМ КАРТОЧЕК ======
  let reviewQueue = [];
  let reviewIndex = 0;
  let reviewedCount = 0;

  function startReview() {
    const now = Date.now();
    reviewQueue = allWords.filter(w => (w.nextReview||0) <= now);
    if (reviewQueue.length === 0) return;
    reviewIndex = 0; reviewedCount = 0;
    document.getElementById('flashcards').classList.add('show');
    document.getElementById('fcDone').style.display = 'none';
    document.getElementById('fcBody').style.display = 'flex';
    showCard();
  }

  function showCard() {
    if (reviewIndex >= reviewQueue.length) { finishReview(); return; }
    const w = reviewQueue[reviewIndex];
    // сколько уникальных слов ещё впереди (включая текущее)
    const remaining = new Set(reviewQueue.slice(reviewIndex).map(x => x.word)).size;
    document.getElementById('fcProgress').textContent = 'Осталось: ' + remaining;
    document.getElementById('fcWord').textContent = w.word;
    document.getElementById('fcWordBack').textContent = w.word;
    document.getElementById('fcPhonetic').textContent = w.phonetic || '';
    document.getElementById('fcTranslation').textContent = w.translation || '(нет перевода)';
    document.getElementById('fcFront').style.display = 'block';
    document.getElementById('fcBack').style.display = 'none';
    document.getElementById('fcActions').style.display = 'none';
  }

  document.getElementById('fcCard').addEventListener('click', () => {
    const back = document.getElementById('fcBack');
    if (back.style.display === 'none') {
      document.getElementById('fcFront').style.display = 'none';
      back.style.display = 'block';
      document.getElementById('fcActions').style.display = 'flex';
    }
  });

  async function answerCard(known) {
    const w = reviewQueue[reviewIndex];
    try {
      await fetch(API + '/api/vocab-review', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ tgId: tgId, word: w.word, known: known })
      });
    } catch(e) {}

    if (known) {
      // знаю — слово засчитано, уходит из сессии
      reviewedCount++;
      reviewIndex++;
    } else {
      // не знаю — возвращаем слово в конец очереди этой сессии
      reviewQueue.push(w);
      reviewIndex++;
    }
    showCard();
  }
  document.getElementById('fcKnow').addEventListener('click', () => answerCard(true));
  document.getElementById('fcDont').addEventListener('click', () => answerCard(false));

  document.getElementById('fcAudio').addEventListener('click', async (e) => {
    e.stopPropagation();
    const w = reviewQueue[reviewIndex];
    try {
      const res = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(w.word));
      const data = await res.json();
      let audio = '';
      if (Array.isArray(data) && data[0] && Array.isArray(data[0].phonetics)) {
        for (const p of data[0].phonetics) if (p.audio) { audio = p.audio; break; }
      }
      if (audio && audio.startsWith('//')) audio = 'https:' + audio;
      if (audio) new Audio(audio).play();
    } catch(err) {}
  });

  function finishReview() {
    document.getElementById('fcBody').style.display = 'none';
    document.getElementById('fcDone').style.display = 'flex';
    document.getElementById('fcDoneText').textContent = 'Слов закреплено: ' + reviewedCount;
  }

        : refCount + ' из 3 друзей · доступно ещё ' + refRemaining;
      const paidPlans = ['month', 'quarter', 'year'];
      const isPaid = active && paidPlans.indexOf(data.plan) >= 0;
      const refHtml = isPaid
        ? '<div class="ref-card">' +
            '<div class="ref-card-ico">🎁</div>' +
            '<div class="ref-card-title">Продли Premium бесплатно</div>' +
            '<div class="ref-card-desc">Пригласи друга — он получит <b>2 недели Premium</b>, ты получишь <b>+1 неделю</b>. До 3 друзей.</div>' +
            '<div class="ref-card-stat">' + refStatus + '</div><br>' +
            '<button class="ref-btn" onclick="shareReferral()">📤 Поделиться ссылкой</button>' +
          '</div>'
        : '<div class="ref-card locked">' +
            '<div class="ref-card-ico">🔒</div>' +
            '<div class="ref-card-title">Приглашай друзей и получай бонусы</div>' +
            '<div class="ref-card-desc">С <b>купленной</b> Premium-подпиской ты сможешь приглашать друзей: каждому — <b>2 недели Premium</b>, тебе — <b>+1 неделя</b> за каждого (до 3 друзей).</div>' +
            '<div class="ref-card-stat" style="opacity:0.6;">Доступно с купленной Premium-подпиской</div>' +
          '</div>';
      content.innerHTML =
        statusHtml +
        '<div class="section-title">Что даёт Premium</div>' +
        '<div class="stat-card" style="animation-delay:0.05s"><div class="benefits-list">' + benefitsHtml + '</div></div>' +
        '<div class="section-title">Тарифы</div>' +
        '<div class="tariff-cards">' + tarifsHtml + '</div>' +
        refHtml +
        (active
          ? '<div style="margin-top:14px;text-align:center;font-size:13px;color:var(--text-dim);">Хочешь продлить? Нажми на тариф 👆</div>'
          : '<div style="margin-top:14px;text-align:center;font-size:13px;color:var(--text-dim);">Нажми на нужный тариф для оплаты 👆</div>');
    } catch(e) {
      content.innerHTML = '<div class="soon"><div class="big">😕</div><h2>Не удалось загрузить</h2><p>Попробуй позже</p></div>';
    }
  }

  loadProfile();
</script>
</body>
</html>
